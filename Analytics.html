<!DOCTYPE html>
<html lang="en">

<head>
  <script>
    (function (c, l, a, r, i, t, y) {
      c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
      t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
      y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
    })(window, document, "clarity", "script", "wrqyl7u61q");
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Smart Finance Management">
  <meta name="theme-color" content="#1043B1">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Magnate">

  <title>Magnate – Analytics</title>
  <link rel="icon" href="favicon.ico" sizes="48x48" type="image/x-icon">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180">
  <link rel="apple-touch-icon" href="apple-touch-icon-167x167.png" sizes="167x167">
  <link rel="apple-touch-icon" href="apple-touch-icon-152x152.png" sizes="152x152">
  <link rel="apple-touch-icon" href="apple-touch-icon-120x120.png" sizes="120x120">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/analytics.css">
</head>

<body>
  <div class="container">

    <button class="hamburger" id="hamburger" aria-label="Toggle navigation menu" aria-expanded="false">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>

    <div class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation"></div>


    <div class="main-content" role="main">
      <div class="content-wrapper">

        <div class="page-header">
          <h1 class="page-title">Analytics</h1>
          <div class="button-group">
            <button id="exportCSV" class="export-btn">Export CSV</button>
            <button id="importCSV" class="export-btn">Import CSV</button>
          </div>
        </div>


        <div class="top-section">
          <div class="budget-card">
            <img src="images/undraw_online-calendar.png" alt="Online calendar illustration" class="top-card-image">
            <div class="budget-card-right">
              <div class="small-card">
                <div class="budget-text-container">
                  <div class="budget-heading">Total Monthly Budget:</div>
                  <div class="budget-amount" id="totalBudget">$0</div>
                </div>
              </div>
              <div class="small-card">
                <div class="budget-text-container">
                  <div class="budget-heading">Budget Remaining:</div>
                  <div class="budget-amount" id="remainingBudget">$0</div>
                </div>
              </div>
              <div class="small-card">
                <div class="budget-text-container">
                  <div class="budget-heading">Monthly Net:</div>
                  <div class="budget-amount" id="netAmount">$0</div>
                </div>
              </div>
            </div>
          </div>


          <div class="progress-card">
            <div class="progress-circle">
              <div class="circle-container">
                <svg viewBox="0 0 250 250" preserveAspectRatio="xMidYMid meet">
                  <defs>
                    <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                      <stop offset="0%" stop-color="#3B82F6" />
                      <stop offset="100%" stop-color="#1E40AF" />
                    </linearGradient>
                  </defs>
                  <circle class="circle-bg" cx="125" cy="125" r="100" fill="none" stroke="#1043B1" stroke-width="20" />
                  <circle class="circle-progress" cx="125" cy="125" r="100" fill="none" stroke="#3B82F6"
                    stroke-width="20" stroke-dasharray="628" stroke-dashoffset="628" stroke-linecap="round"
                    style="transform: rotate(-90deg); transform-origin: 50% 50%;" id="progressCircle"></circle>
                </svg>
                <div class="circle-text" id="progressText">0%<br>Spent</div>
              </div>
            </div>
          </div>
        </div>



        <div class="graph-row">

          <div class="weekly-expenses-card">
            <h2 style="font-size: 1.1rem;">Weekly Expenses/Income Overview</h2>
            <div class="week-nav">
              <button class="week-arrow" id="btnPrevWeek">&lt;</button>
              <span class="week-label" id="weekLabel"></span>
              <button class="week-arrow" id="btnNextWeek">&gt;</button>
            </div>
            <div class="bar-chart-container">
              <canvas id="weeklyChart"></canvas>
            </div>
          </div>


          <div class="total-expenses-card">
            <div class="card-header">
              <div class="expenses-title" id="categoryCardTitle">Weekly Spending by Category:</div>
              <button id="toggleCategoryView">→</button>
            </div>
            <div id="categoriesCards"></div>
          </div>
        </div>



        <div class="monthly-category-wrapper">
          <div class="card-header">
            <div class="expenses-title" id="monthlyCardTitle">Monthly Spending by Category:</div>
            <button id="toggleMonthlyView">→</button>
          </div>
          <div id="monthlyCategoryCards"></div>
        </div>

      </div>
    </div>
  </div>

  <script src="js/navigation.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/dialogs.js"></script>
  <script src="js/data-manager.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1"></script>
  <script src="js/analytics.js"></script>
  <script src="js/csv-handler.js"></script>
</body>

</html>
