<!DOCTYPE html>
<html lang="en">

<head>
  <script>
    (function (c, l, a, r, i, t, y) {
      c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
      t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
      y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
    })(window, document, "clarity", "script", "wrqyl7u61q");
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Smart Finance Management">
  <meta name="theme-color" content="#1043B1">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Magnate">

  <title>Magnate – Track Transactions</title>
  <link rel="icon" href="favicon.ico" sizes="48x48" type="image/x-icon">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180">
  <link rel="apple-touch-icon" href="apple-touch-icon-dark.png" sizes="180x180" media="(prefers-color-scheme: dark)">
  <link rel="apple-touch-icon" href="apple-touch-icon-167x167.png" sizes="167x167">
  <link rel="apple-touch-icon" href="apple-touch-icon-167x167-dark.png" sizes="167x167" media="(prefers-color-scheme: dark)">
  <link rel="apple-touch-icon" href="apple-touch-icon-152x152.png" sizes="152x152">
  <link rel="apple-touch-icon" href="apple-touch-icon-152x152-dark.png" sizes="152x152" media="(prefers-color-scheme: dark)">
  <link rel="apple-touch-icon" href="apple-touch-icon-120x120.png" sizes="120x120">
  <link rel="apple-touch-icon" href="apple-touch-icon-120x120-dark.png" sizes="120x120" media="(prefers-color-scheme: dark)">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/track-transactions.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde@2.21.0/dist/easymde.min.css">
</head>

<body>
  <div class="container">

    <button class="hamburger" id="hamburger" aria-label="Toggle navigation menu" aria-expanded="false">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>

    <div class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation"></div>


    <div class="main-content" role="main">
      <div class="content-wrapper">
        <h1 class="page-title">Track Transactions</h1>


        <div class="quick-actions">

          <button class="action-card" id="btnAddExpense">
            <span class="action-left">
              <span class="icon-circle icon-circle-expense">
                <svg class="icon" viewBox="0 0 24 24">
                  <line x1="7" y1="7" x2="17" y2="17"></line>
                  <polyline points="17 7 17 17 7 17"></polyline>
                </svg>
              </span>
              <span class="action-label">Add Expense</span>
            </span>
            <span class="action-right">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
            </span>
          </button>


          <button class="action-card" id="btnAddIncome">
            <span class="action-left">
              <span class="icon-circle icon-circle-income">
                <svg class="icon" viewBox="0 0 24 24">
                  <line x1="7" y1="17" x2="17" y2="7"></line>
                  <polyline points="7 7 17 7 17 17"></polyline>
                </svg>
              </span>
              <span class="action-label">Add Income</span>
            </span>
            <span class="action-right">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
            </span>
          </button>
        </div>


        <div class="week-card">
          <div class="week-card-header">
            <button id="prevWeekBtn" class="arrow-btn">&larr;</button>
            <span id="weekHeading">Week of</span>
            <button id="nextWeekBtn" class="arrow-btn">&rarr;</button>
          </div>
          <div class="search-pill">
            <span class="pill-search-icon"></span>
            <input type="text" id="transactionSearch" class="search-input" placeholder="Search transactions...">
            <button class="search-clear-btn" id="transactionSearchClear" aria-label="Clear search"
              type="button">&times;</button>
          </div>
          <div class="transactions-grid">

            <div class="transactions-column" id="expensesColumn">
              <h2>Expenses</h2>

            </div>


            <div class="transactions-column" id="incomeColumn">
              <h2>Income</h2>

            </div>
          </div>
        </div>


        <div class="transaction-groups">
          <div class="groups-row">
            <div class="groups-column">
              <h2 class="groups-column-title">Expense Groups</h2>
              <div id="expenseGroupsContainer"></div>
            </div>
            <div class="groups-column">
              <h2 class="groups-column-title">Income Groups</h2>
              <div id="incomeGroupsContainer"></div>
            </div>
          </div>
        </div>


        <div class="notes-section">
          <div class="notes-header">
            <h2 class="notes-title">Notes</h2>
          </div>
          <div class="notes-container">
            <textarea class="notes-textarea" id="notesTextarea"
              aria-label="Notes editor with Markdown support"></textarea>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/navigation.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/dialogs.js"></script>
  <script src="js/data-manager.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/easymde@2.21.0/dist/easymde.min.js"></script>
  <script src="js/track-transactions.js"></script>
</body>

</html>
